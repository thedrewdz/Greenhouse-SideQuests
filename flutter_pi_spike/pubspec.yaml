name: flutter_pi_spike
description: A self-contained spike proving we can build and deploy a flutter-pi application on a Raspberry Pi 4.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.10.5'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Run via `dart run flutterpi_tool ...` - do NOT `flutter pub global activate`
  # it (Dart pub forbids globally activating SDK-dependent tools). 0.11.0 needs
  # Flutter 3.41.x; newer Flutter breaks it.
  flutterpi_tool: ^0.11.0

flutter:
  uses-material-design: true
